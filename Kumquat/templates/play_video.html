
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Play Video</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #181818;
            color: #fff;
        }
        header {
            background: #ff9800;
            padding: 1.5rem 2rem;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
        }
        .library {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: #222;
        }
        .video-card {
            background: #181818;
            padding: 2rem;
            border-radius: 8px;
            width: 800px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            color: #fff;
        }
        .video-card h2 {
            margin: 0 0 1rem 0;
            color: #ff9800;
            font-size: 1.5rem;
        }
        .cta-btn {
            background: #ff9800;
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-top: 2rem;
        }
        .cta-btn:hover {
            background: #e67c00;
        }
        footer {
            text-align: center;
            padding: 1.5rem 2rem;
            background: #222;
            color: #aaa;
            font-size: 1rem;
        }
        video {
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            background: #000;
        }
    </style>
</head>
<body>
    <header>
        <h1>Kumquat Video</h1>
    </header>
    <section class="library">
        <div class="video-card">
            <h2>Playing: {{ filename }}</h2>
            <video width="760" controls autoplay>
                <source src="{{ url_for('serve_video', filename=filename) }}" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <br>
            <a href="{{ url_for('files') }}" class="cta-btn">Back to Files</a>
        </div>
    </section>
    <footer>
        &copy; 2024 Kumquat Video Service. All rights reserved.
    </footer>
</body>
</html>
